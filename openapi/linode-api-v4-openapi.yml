          minLength: 3
          maxLength: 64
          description: >-
            The label for the service.
        service_type:
          type: string
          enum:
            - url
          description: >-
            The type of service monitor.
        address:
          type: string
          description: >-
            The URL to monitor.
        timeout:
          type: integer
          minimum: 1
          maximum: 255
          description: >-
