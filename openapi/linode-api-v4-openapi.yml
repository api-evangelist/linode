components:
  securitySchemes:
    personalAccessToken:
      type: http
      scheme: bearer
      description: >-
        A personal access token generated from the Linode Cloud Manager
        that grants access to the API based on the token's scopes.
    oauth:
      type: oauth2
      description: >-
        OAuth 2.0 authentication for third-party applications.
      flows:
        authorizationCode:
          authorizationUrl: https://login.linode.com/oauth/authorize
          tokenUrl: https://login.linode.com/oauth/token
          scopes:
            account:read_only: Read access to account information
            account:read_write: Read and write access to account information
            domains:read_only: Read access to domains
            domains:read_write: Read and write access to domains
            events:read_only: Read access to events
            events:read_write: Read and write access to events
            firewall:read_only: Read access to firewalls
            firewall:read_write: Read and write access to firewalls
            images:read_only: Read access to images
            images:read_write: Read and write access to images
            ips:read_only: Read access to IP addresses
            ips:read_write: Read and write access to IP addresses
            linodes:read_only: Read access to Linodes
            linodes:read_write: Read and write access to Linodes
            lke:read_only: Read access to LKE
            lke:read_write: Read and write access to LKE
            longview:read_only: Read access to Longview
            longview:read_write: Read and write access to Longview
            nodebalancers:read_only: Read access to NodeBalancers
            nodebalancers:read_write: Read and write access to NodeBalancers
            object_storage:read_only: Read access to Object Storage
            object_storage:read_write: Read and write access to Object Storage
            stackscripts:read_only: Read access to StackScripts
            stackscripts:read_write: Read and write access to StackScripts
            volumes:read_only: Read access to Volumes
            volumes:read_write: Read and write access to Volumes
            vpc:read_only: Read access to VPCs
            vpc:read_write: Read and write access to VPCs
  parameters:
    pageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: >-
        The page number to return.
    pageSizeParam:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 25
        maximum: 500
        default: 100
      description: >-
        The number of items per page.
    linodeIdParam:
      name: linodeId
      in: path
      required: true
      schema:
        type: integer
      description: >-
        The ID of the Linode instance.
    domainIdParam:
      name: domainId
      in: path
      required: true
      schema:
        type: integer
      description: >-
        The ID of the domain.
    imageIdParam:
      name: imageId
      in: path
      required: true
      schema:
        type: string
      description: >-
        The ID of the image.
    volumeIdParam:
      name: volumeId
      in: path
      required: true
      schema:
        type: integer
      description: >-
        The ID of the volume.
    clusterIdParam:
      name: clusterId
      in: path
      required: true
      schema:
        type: integer
      description: >-
        The ID of the LKE cluster.
    nodeBalancerIdParam:
      name: nodeBalancerId
      in: path
      required: true
      schema:
        type: integer
      description: >-
        The ID of the NodeBalancer.
    firewallIdParam:
      name: firewallId
      in: path
      required: true
      schema:
        type: integer
      description: >-
        The ID of the firewall.
    vpcIdParam:
      name: vpcId
      in: path
      required: true
      schema:
        type: integer
      description: >-
        The ID of the VPC.
    regionIdParam:
      name: regionId
      in: path
      required: true
      schema:
        type: string
      description: >-
        The ID of the region.
    bucketParam:
      name: bucket
      in: path
      required: true
      schema:
        type: string
      description: >-
        The name of the Object Storage bucket.
    usernameParam:
      name: username
      in: path
      required: true
      schema:
        type: string
      description: >-
        The username of the user.
    eventIdParam:
      name: eventId
      in: path
      required: true
      schema:
        type: integer
      description: >-
        The ID of the event.
    stackscriptIdParam:
      name: stackscriptId
      in: path
      required: true
      schema:
        type: integer
      description: >-
        The ID of the StackScript.
    databaseEngineParam:
      name: databaseEngine
      in: path
      required: true
      schema:
        type: string
        enum:
          - mysql
          - postgresql
      description: >-
        The database engine type.
    databaseIdParam:
      name: databaseId
      in: path
      required: true
      schema:
        type: integer
      description: >-
        The ID of the Managed Database instance.
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          description: >-
            The current page number.
        pages:
          type: integer
          description: >-
            The total number of pages.
        results:
          type: integer
          description: >-
            The total number of results.
    Account:
      type: object
      properties:
        company:
          type: string
          description: >-
            The company name associated with this account.
        email:
          type: string
          format: email
          description: >-
            The email address associated with this account.
        first_name:
          type: string
          description: >-
            The first name of the account holder.
        last_name:
          type: string
          description: >-
            The last name of the account holder.
        address_1:
          type: string
          description: >-
            The first line of the account's address.
        address_2:
          type: string
          description: >-
            The second line of the account's address.
        city:
          type: string
          description: >-
            The city of the account's address.
        state:
          type: string
          description: >-
            The state or province of the account's address.
        zip:
          type: string
          description: >-
            The postal code of the account's address.
        country:
          type: string
          description: >-
            The two-letter ISO 3166-1 country code.
        phone:
          type: string
          description: >-
            The phone number for the account.
        balance:
          type: number
          format: float
          description: >-
            The current account balance in US dollars.
        active_since:
          type: string
          format: date-time
          description: >-
            The date and time the account was activated.
        capabilities:
          type: array
          items:
            type: string
          description: >-
            A list of capabilities enabled on this account.
    User:
      type: object
      properties:
        username:
          type: string
          description: >-
            The user's username.
        email:
          type: string
          format: email
          description: >-
            The user's email address.
        restricted:
          type: boolean
          description: >-
            Whether the user has restricted access to account resources.
        ssh_keys:
          type: array
          items:
            type: string
          description: >-
            A list of SSH key labels associated with the user.
        tfa_enabled:
          type: boolean
          description: >-
            Whether two-factor authentication is enabled.
    UserRequest:
      type: object
      required:
        - username
        - email
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          description: >-
            The user's username.
        email:
          type: string
          format: email
          description: >-
            The user's email address.
        restricted:
          type: boolean
          description: >-
            Whether the user should have restricted access.
    Event:
      type: object
      properties:
        id:
          type: integer
          description: >-
            The unique ID of the event.
        action:
          type: string
          description: >-
            The action that caused this event.
          enum:
            - linode_boot
            - linode_create
            - linode_delete
            - linode_reboot
            - linode_rebuild
            - linode_resize
            - linode_shutdown
            - linode_update
            - disk_create
            - disk_delete
            - disk_resize
            - domain_create
            - domain_delete
            - domain_update
            - domain_record_create
            - domain_record_delete
            - domain_record_update
            - firewall_create
            - firewall_delete
            - firewall_update
            - lke_cluster_create
            - lke_cluster_delete
            - lke_cluster_update
            - nodebalancer_create
            - nodebalancer_delete
            - nodebalancer_update
            - volume_create
            - volume_delete
            - volume_attach
            - volume_detach
        created:
          type: string
          format: date-time
          description: >-
            When this event was created.
        entity:
          type: object
          properties:
            id:
              type: integer
              description: >-
                The ID of the entity related to this event.
            label:
              type: string
              description: >-
                The label of the entity.
            type:
              type: string
              description: >-
                The type of entity.
            url:
              type: string
              description: >-
                The URL of the entity in the API.
          description: >-
            The entity that this event is related to.
        status:
          type: string
          enum:
            - failed
            - finished
            - notification
            - scheduled
            - started
          description: >-
            The current status of the event.
        username:
          type: string
          description: >-
            The username of the user who initiated this event.
        percent_complete:
          type: integer
          minimum: 0
          maximum: 100
          description: >-
            The percentage of completion for the event.
        seen:
          type: boolean
          description: >-
            Whether the event has been seen by the user.
        read:
          type: boolean
          description: >-
            Whether the event has been read by the user.
    Linode:
      type: object
      properties:
        id:
          type: integer
          description: >-
            The unique ID of this Linode instance.
        label:
          type: string
          description: >-
            The label for this Linode instance.
        region:
          type: string
          description: >-
            The region where this Linode is located.
        type:
          type: string
          description: >-
            The Linode type ID of this instance.
        image:
          type: string
          description: >-
            The image ID used to deploy this Linode.
        status:
          type: string
          enum:
            - running
            - offline
            - booting
            - rebooting
            - shutting_down
            - provisioning
            - deleting
            - migrating
            - rebuilding
            - cloning
            - restoring
            - stopped
          description: >-
            The current status of the Linode instance.
        ipv4:
          type: array
          items:
            type: string
            format: ipv4
          description: >-
            The IPv4 addresses associated with this Linode.
        ipv6:
          type: string
          description: >-
            The IPv6 SLAAC address for this Linode.
        created:
          type: string
          format: date-time
          description: >-
            When this Linode was created.
        updated:
          type: string
          format: date-time
          description: >-
            When this Linode was last updated.
        group:
          type: string
          description: >-
            The display group for this Linode.
          deprecated: true
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags applied to this Linode for organizational purposes.
        hypervisor:
          type: string
          description: >-
            The hypervisor this Linode is running on.
        specs:
          type: object
          properties:
            disk:
              type: integer
              description: >-
                The amount of disk space in MB.
            memory:
              type: integer
              description: >-
                The amount of RAM in MB.
            vcpus:
              type: integer
              description: >-
                The number of virtual CPUs.
            gpus:
              type: integer
              description: >-
                The number of GPUs.
            transfer:
              type: integer
              description: >-
                The monthly network transfer quota in GB.
          description: >-
            The hardware specifications for this Linode type.
        alerts:
          type: object
          properties:
            cpu:
              type: integer
              description: >-
                CPU usage alert threshold percentage.
            io:
              type: integer
              description: >-
                Disk IO rate alert threshold.
            network_in:
              type: integer
              description: >-
                Incoming network traffic alert threshold in Mb/s.
            network_out:
              type: integer
              description: >-
                Outgoing network traffic alert threshold in Mb/s.
            transfer_quota:
              type: integer
              description: >-
                Transfer quota usage alert threshold percentage.
          description: >-
            Alert thresholds for this Linode instance.
        backups:
          type: object
          properties:
            enabled:
              type: boolean
              description: >-
                Whether the backup service is enabled.
            available:
              type: boolean
              description: >-
                Whether any backups are available.
            schedule:
              type: object
              properties:
                day:
                  type: string
                  description: >-
                    The day of the week for automatic backups.
                window:
                  type: string
                  description: >-
                    The window for automatic backups.
          description: >-
            Information about this Linode's backup service.
        watchdog_enabled:
          type: boolean
          description: >-
            Whether Lassie the watchdog is enabled to restart
            this Linode if it crashes.
    LinodeRequest:
      type: object
      required:
        - region
        - type
      properties:
        region:
          type: string
          description: >-
            The region where the Linode will be created.
        type:
          type: string
          description: >-
            The Linode type to deploy.
        image:
          type: string
          description: >-
            The image to deploy with. Required if no backup_id is provided.
        label:
          type: string
          minLength: 3
          maxLength: 64
          pattern: '^[a-zA-Z]((?!--|__)[a-zA-Z0-9-_])+$'
          description: >-
            The label for the new Linode instance.
        root_pass:
          type: string
          description: >-
            The root password for the new Linode instance.
        authorized_keys:
          type: array
          items:
            type: string
          description: >-
            A list of public SSH keys to deploy with.
        authorized_users:
          type: array
          items:
            type: string
          description: >-
            A list of usernames whose SSH keys to deploy.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags for the new Linode.
        stackscript_id:
          type: integer
          description: >-
            A StackScript ID to deploy with.
        stackscript_data:
          type: object
          additionalProperties:
            type: string
          description: >-
            UDF data for the StackScript.
        backup_id:
          type: integer
          description: >-
            A backup ID to restore from.
        backups_enabled:
          type: boolean
          description: >-
            Whether to enable the backup service.
        private_ip:
          type: boolean
          description: >-
            Whether to assign a private IPv4 address.
        booted:
          type: boolean
          default: true
          description: >-
            Whether the new Linode should be booted after creation.
    LinodeUpdateRequest:
      type: object
      properties:
        label:
          type: string
          minLength: 3
          maxLength: 64
          description: >-
            The label for the Linode instance.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags for the Linode.
        watchdog_enabled:
          type: boolean
          description: >-
            Whether to enable Lassie the watchdog.
        alerts:
          type: object
          properties:
            cpu:
              type: integer
            io:
              type: integer
            network_in:
              type: integer
            network_out:
              type: integer
            transfer_quota:
              type: integer
    LinodeRebuildRequest:
      type: object
      required:
        - image
        - root_pass
      properties:
        image:
          type: string
          description: >-
            The image to rebuild with.
        root_pass:
          type: string
          description: >-
            The root password for the rebuilt instance.
        authorized_keys:
          type: array
          items:
            type: string
          description: >-
            A list of public SSH keys.
        authorized_users:
          type: array
          items:
            type: string
          description: >-
            A list of usernames whose SSH keys to deploy.
        stackscript_id:
          type: integer
          description: >-
            A StackScript ID to deploy with.
        stackscript_data:
          type: object
          additionalProperties:
            type: string
          description: >-
            UDF data for the StackScript.
        booted:
          type: boolean
          default: true
          description: >-
            Whether to boot after rebuild.
    LinodeIPAddresses:
      type: object
      properties:
        ipv4:
          type: object
          properties:
            public:
              type: array
              items:
                $ref: '#/components/schemas/IPAddress'
              description: >-
                Public IPv4 addresses.
            private:
              type: array
              items:
                $ref: '#/components/schemas/IPAddress'
              description: >-
                Private IPv4 addresses.
            shared:
              type: array
              items:
                $ref: '#/components/schemas/IPAddress'
              description: >-
                Shared IPv4 addresses.
            reserved:
              type: array
              items:
                $ref: '#/components/schemas/IPAddress'
              description: >-
                Reserved IPv4 addresses.
        ipv6:
          type: object
          properties:
            slaac:
              $ref: '#/components/schemas/IPv6Address'
            link_local:
              $ref: '#/components/schemas/IPv6Address'
            global:
              type: array
              items:
                $ref: '#/components/schemas/IPv6Range'
    Domain:
      type: object
      properties:
        id:
          type: integer
          description: >-
            The unique ID of this domain.
        domain:
          type: string
          description: >-
            The domain name.
        type:
          type: string
          enum:
            - master
            - slave
          description: >-
            Whether this is a master or slave zone.
        status:
          type: string
          enum:
            - active
            - disabled
            - edit_mode
          description: >-
            The status of this domain.
        soa_email:
          type: string
          format: email
          description: >-
            The SOA email address for this domain.
        description:
          type: string
          description: >-
            A description for this domain.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags for this domain.
        created:
          type: string
          format: date-time
          description: >-
            When this domain was created.
        updated:
          type: string
          format: date-time
          description: >-
            When this domain was last updated.
        ttl_sec:
          type: integer
          description: >-
            The default TTL in seconds.
        retry_sec:
          type: integer
          description: >-
            The retry interval in seconds.
        refresh_sec:
          type: integer
          description: >-
            The refresh interval in seconds.
        expire_sec:
          type: integer
          description: >-
            The expiry time in seconds.
    DomainRequest:
      type: object
      required:
        - domain
        - type
      properties:
        domain:
          type: string
          description: >-
            The domain name.
        type:
          type: string
          enum:
            - master
            - slave
          description: >-
            Whether this is a master or slave zone.
        soa_email:
          type: string
          format: email
          description: >-
            The SOA email address.
        description:
          type: string
          description: >-
            A description for this domain.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags for this domain.
    DomainRecord:
      type: object
      properties:
        id:
          type: integer
          description: >-
            The unique ID of this domain record.
        type:
          type: string
          enum:
            - A
            - AAAA
            - NS
            - MX
            - CNAME
            - TXT
            - SRV
            - PTR
            - CAA
          description: >-
            The type of DNS record.
        name:
          type: string
          description: >-
            The hostname or FQDN for this record.
        target:
          type: string
          description: >-
            The target for this record.
        priority:
          type: integer
          description: >-
            The priority for MX and SRV records.
        weight:
          type: integer
          description: >-
            The weight for SRV records.
        port:
          type: integer
          description: >-
            The port for SRV records.
        ttl_sec:
          type: integer
          description: >-
            The TTL in seconds for this record.
        tag:
          type: string
          description: >-
            The tag for CAA records.
    DomainRecordRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - A
            - AAAA
            - NS
            - MX
            - CNAME
            - TXT
            - SRV
            - PTR
            - CAA
          description: >-
            The type of DNS record.
        name:
          type: string
          description: >-
            The hostname or FQDN.
        target:
          type: string
          description: >-
            The target value.
        priority:
          type: integer
          description: >-
            The priority for MX and SRV records.
        weight:
          type: integer
          description: >-
            The weight for SRV records.
        port:
          type: integer
          description: >-
            The port for SRV records.
        ttl_sec:
          type: integer
          description: >-
            The TTL in seconds.
    Image:
      type: object
      properties:
        id:
          type: string
          description: >-
            The unique ID of this image.
        label:
          type: string
          description: >-
            The label of this image.
        description:
          type: string
          description: >-
            A description of this image.
        type:
          type: string
          enum:
            - manual
            - automatic
          description: >-
            Whether this is a manual or automatic image.
        is_public:
          type: boolean
          description: >-
            Whether this image is publicly available.
        size:
          type: integer
          description: >-
            The size of this image in MB.
        status:
          type: string
          enum:
            - available
            - creating
            - pending_upload
          description: >-
            The status of this image.
        vendor:
          type: string
          description: >-
            The upstream distribution vendor.
        created:
          type: string
          format: date-time
          description: >-
            When this image was created.
        updated:
          type: string
          format: date-time
          description: >-
            When this image was last updated.
        expiry:
          type: string
          format: date-time
          description: >-
            When this image expires. Null for distribution images.
    ImageRequest:
      type: object
      required:
        - disk_id
      properties:
        disk_id:
          type: integer
          description: >-
            The ID of the disk to create the image from.
        label:
          type: string
          minLength: 1
          maxLength: 128
          description: >-
            The label for the new image.
        description:
          type: string
          maxLength: 65000
          description: >-
            A description for the new image.
    ImageUpdateRequest:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 128
          description: >-
            The label for the image.
        description:
          type: string
          maxLength: 65000
          description: >-
            A description for the image.
    Volume:
      type: object
      properties:
        id:
          type: integer
          description: >-
            The unique ID of this volume.
        label:
          type: string
          description: >-
            The label of this volume.
        status:
          type: string
          enum:
            - creating
            - active
            - resizing
            - deleting
          description: >-
            The current status of this volume.
        size:
          type: integer
          description: >-
            The size of this volume in GB.
        region:
          type: string
          description: >-
            The region where this volume is located.
        linode_id:
          type: integer
          description: >-
            The ID of the Linode this volume is attached to, or null.
        linode_label:
          type: string
          description: >-
            The label of the Linode this volume is attached to.
        filesystem_path:
          type: string
          description: >-
            The filesystem path for this volume on the attached Linode.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags for this volume.
        created:
          type: string
          format: date-time
          description: >-
            When this volume was created.
        updated:
          type: string
          format: date-time
          description: >-
            When this volume was last updated.
    VolumeRequest:
      type: object
      required:
        - label
        - size
        - region
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 32
          description: >-
            The label for the new volume.
        size:
          type: integer
          minimum: 10
          maximum: 10240
          description: >-
            The size of the volume in GB.
        region:
          type: string
          description: >-
            The region to create the volume in.
        linode_id:
          type: integer
          description: >-
            A Linode instance to attach the volume to.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags for the new volume.
    VolumeUpdateRequest:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 32
          description: >-
            The new label for the volume.
        tags:
          type: array
          items:
            type: string
          description: >-
            Updated tags for the volume.
    LKECluster:
      type: object
      properties:
        id:
          type: integer
          description: >-
            The unique ID of this LKE cluster.
        label:
          type: string
          description: >-
            The label for this cluster.
        region:
          type: string
          description: >-
            The region where this cluster is located.
        k8s_version:
          type: string
          description: >-
            The Kubernetes version for this cluster.
        status:
          type: string
          enum:
            - ready
            - not_ready
          description: >-
            The current status of the cluster.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags for this cluster.
        control_plane:
          type: object
          properties:
            high_availability:
              type: boolean
              description: >-
                Whether the control plane is highly available.
          description: >-
            Control plane configuration for this cluster.
        created:
          type: string
          format: date-time
          description: >-
            When this cluster was created.
        updated:
          type: string
          format: date-time
          description: >-
            When this cluster was last updated.
    LKEClusterRequest:
      type: object
      required:
        - label
        - region
        - k8s_version
        - node_pools
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 32
          description: >-
            The label for the new cluster.
        region:
          type: string
          description: >-
            The region for the cluster.
        k8s_version:
          type: string
          description: >-
            The Kubernetes version for the cluster.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags for the cluster.
        node_pools:
          type: array
          items:
            $ref: '#/components/schemas/NodePoolRequest'
          description: >-
            Node pool configurations for the cluster.
        control_plane:
          type: object
          properties:
            high_availability:
              type: boolean
              description: >-
                Whether to enable high availability for the control plane.
    LKEClusterUpdateRequest:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 32
          description: >-
            The label for the cluster.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags for the cluster.
        k8s_version:
          type: string
          description: >-
            The target Kubernetes version.
        control_plane:
          type: object
          properties:
            high_availability:
              type: boolean
              description: >-
                Whether to enable high availability.
    NodePool:
      type: object
      properties:
        id:
          type: integer
          description: >-
            The unique ID of this node pool.
        type:
          type: string
          description: >-
            The Linode type for nodes in this pool.
        count:
          type: integer
          description: >-
            The number of nodes in this pool.
        nodes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: >-
                  The unique ID of this node.
              instance_id:
