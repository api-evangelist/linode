        notes:
          type: string
          description: >-
            Notes about this service.
        region:
          type: string
          description: >-
            The region to monitor from.
        credentials:
          type: array
          items:
            type: integer
          description: >-
            Credential IDs for accessing this service.
        created:
          type: string
          format: date-time
          description: >-
            When this service was created.
        updated:
          type: string
          format: date-time
          description: >-
            When this service was last updated.
