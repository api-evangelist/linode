        body:
          type: string
          maxLength: 100
          description: >-
            A string to look for in the response body.
        consultation_group:
          type: string
          description: >-
            The group of managed contacts to notify.
        notes:
          type: string
          description: >-
            Notes about this service.
        credentials:
          type: array
          items:
            type: integer
          description: >-
            Credential IDs for this service.
    BackupResponse:
      type: object
      properties:
        automatic:
          type: array
          items:
            $ref: '#/components/schemas/Backup'
          description: >-
            Automatic backups.
        snapshot:
          type: object
          properties:
            current:
              $ref: '#/components/schemas/Backup'
            in_progress:
              $ref: '#/components/schemas/Backup'
          description: >-
            Snapshot backups.
    Backup:
      type: object
      properties:
        id:
          type: integer
          description: >-
            The unique ID of this backup.
        type:
          type: string
          enum:
            - auto
            - snapshot
          description: >-
            The type of backup.
        status:
          type: string
          enum:
            - paused
            - pending
            - running
            - needsPostProcessing
            - successful
            - failed
            - userAborted
          description: >-
            The status of this backup.
        created:
          type: string
          format: date-time
          description: >-
            When this backup was created.
        updated:
          type: string
          format: date-time
          description: >-
            When this backup was last updated.
        finished:
          type: string
          format: date-time
          description: >-
            When this backup finished.
        label:
          type: string
          description: >-
            The label for snapshot backups.
        disks:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              size:
                type: integer
              filesystem:
                type: string
          description: >-
            Disk information for this backup.
