specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Linode (Akamai Cloud)
providerId: linode
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Cloud Compute
description: Linode API v4 rate limits per token.
sources:
  - https://www.linode.com/pricing/
  - https://www.linode.com/docs/api/
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: API v4 (default)
    scope: user
    metric: requests_per_2min
    limit: 800
    timeFrame: 2 minutes
  - name: Linode create / boot / shutdown
    scope: user
    metric: requests_per_minute
    limit: 25
    timeFrame: minute
  - name: Object Storage S3 API
    scope: bucket
    metric: requests_per_second
    limit: high (S3 spec)
